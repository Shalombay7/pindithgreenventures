<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#fde68a" />
    </linearGradient>
    <linearGradient id="grill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3f3f46" />
      <stop offset="100%" stop-color="#52525b" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)" />
  <circle cx="220" cy="220" r="120" fill="#fde047" />
  <circle cx="980" cy="160" r="90" fill="#fcd34d" />

  <!-- Grill base -->
  <rect x="200" y="480" width="800" height="260" rx="32" fill="url(#grill)" />
  <rect x="240" y="430" width="720" height="70" rx="24" fill="#27272a" />

  <!-- Grill bars -->
  <g stroke="#a1a1aa" stroke-width="14">
    <line x1="270" y1="480" x2="270" y2="740" />
    <line x1="350" y1="480" x2="350" y2="740" />
    <line x1="430" y1="480" x2="430" y2="740" />
    <line x1="510" y1="480" x2="510" y2="740" />
    <line x1="590" y1="480" x2="590" y2="740" />
    <line x1="670" y1="480" x2="670" y2="740" />
    <line x1="750" y1="480" x2="750" y2="740" />
    <line x1="830" y1="480" x2="830" y2="740" />
    <line x1="910" y1="480" x2="910" y2="740" />
  </g>

  <!-- Stylized rabbit silhouette -->
  <g fill="#f59e0b">
    <ellipse cx="560" cy="560" rx="170" ry="110" />
    <circle cx="420" cy="520" r="50" />
    <ellipse cx="390" cy="430" rx="26" ry="70" transform="rotate(-15 390 430)" />
    <ellipse cx="440" cy="420" rx="26" ry="70" transform="rotate(5 440 420)" />
    <circle cx="455" cy="515" r="8" fill="#1f2937" />
  </g>

  <!-- Smoke -->
  <g fill="#fef9c3" opacity="0.85">
    <circle cx="740" cy="300" r="32" />
    <circle cx="790" cy="260" r="26" />
    <circle cx="830" cy="220" r="22" />
  </g>

  <text x="120" y="120" font-family="Georgia, serif" font-size="56" fill="#92400e">Rabbit Barbecue</text>
  <text x="120" y="180" font-family="Georgia, serif" font-size="28" fill="#a16207">Fresh, smoky, and made to order</text>
</svg>
